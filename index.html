<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #1db954; 
            --primary-glow: rgba(29, 185, 84, 0.6);
            --bg: #050505; 
            --surface: #121212; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- ESTILO DA BARRA DE ROLAGEM --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #252525; border-radius: 10px; transition: 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- MODAL DE ENTRADA --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #111; padding: 40px; border-radius: 20px;
            text-align: center; border: 2px solid var(--primary);
            box-shadow: 0 0 40px var(--primary-glow);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px; width: 90%;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content h1 { color: #fff; margin-bottom: 10px; font-size: 2rem; }
        .modal-content h1 span { color: var(--primary); }
        .modal-content p { color: #aaa; margin-bottom: 25px; font-size: 0.95rem; }
        .modal-content input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333;
            background: #000; color: #fff; font-size: 1.1rem; text-align: center;
            margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        .modal-content input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .modal-content button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: var(--primary); color: #000; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .modal-content button:hover { background: #1ed760; transform: scale(1.05); }

        /* --- LETREIRO --- */
        .marquee-wrapper {
            background: #000; border-bottom: 2px solid var(--primary); padding: 10px 0; 
            overflow: hidden; white-space: nowrap; flex-shrink: 0; position: relative;
        }
        .marquee-content {
            display: inline-block; padding-left: 100%; 
            animation: scroll-left 25s linear infinite;
            font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.8rem;
        }
        @keyframes scroll-left { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); } 
        }

        /* Estilo especial para quem acabou de entrar */
        .destaque-entrada {
            color: #fff !important;
            background: linear-gradient(45deg, #ff007f, #7928ca) !important;
            border: none !important;
            box-shadow: 0 0 15px rgba(255,0,127,0.5);
            display: inline-block;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 280px; background: #000; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .sidebar-right { width: 320px; background: #000; display: flex; flex-direction: column; border-left: 1px solid #222; }

        .header-section { padding: 15px; text-align: center; border-bottom: 1px solid #111; font-size: 0.9rem; color: var(--primary); font-weight: bold; }
        .radio-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; scrollbar-gutter: stable; }
        
        .radio-item { 
            padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; 
            align-items: center; gap: 10px; background: #0f0f0f; font-size: 0.8rem; transition: 0.2s;
            border: 1px solid transparent;
        }
        .radio-item:hover { background: #1a1a1a; border-color: #333; }
        .radio-item.active { border: 1px solid var(--primary); background: #151515; }

        /* --- CHAT --- */
        #chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; }
        .msg { background: #111; padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary); word-wrap: break-word; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg b { color: var(--primary); font-size: 0.7rem; display: block; margin-bottom: 2px; text-transform: uppercase; }
        
        .chat-input-area { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; }
        .chat-input-area input { width: 100%; background: #181818; border: 1px solid #333; padding: 12px; color: white; border-radius: 5px; outline: none; margin-bottom: 8px; }
        .chat-input-area button { width: 100%; background: var(--primary); border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; transition: 0.2s; }

        /* --- PLAYER --- */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; padding: 20px; }
        .album-art { width: 200px; height: 200px; background: #181818; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; border: 6px solid #222; transition: 0.5s; position: relative; z-index: 1; }
        .playing .album-art { border-color: var(--primary); animation: rotateDisk 10s linear infinite; box-shadow: 0 0 30px var(--primary-glow); }
        
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .volume-container { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 50px; width: 250px; border: 1px solid #222; }
        #volumeSlider { flex: 1; accent-color: var(--primary); cursor: pointer; }

        .online-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--primary); font-size: 0.65rem; color: var(--primary); font-weight: bold; backdrop-filter: blur(5px); }
        
        .clock-badge { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: #fff; 
            font-weight: 600; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px);
            letter-spacing: 1px;
        }
        .clock-badge span { color: var(--primary); }

        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; }
            .app-body { flex-direction: column; height: auto; overflow: visible; }
            .sidebar-left, .sidebar-right, .main { width: 100%; height: auto; border: none; }
            .sidebar-left { order: 3; max-height: 400px; border-top: 1px solid #222; }
            .main { order: 1; padding: 60px 20px; min-height: 400px; }
            .sidebar-right { order: 2; height: 500px; border-top: 1px solid #222; border-bottom: 1px solid #222; }
            .clock-badge { top: 10px; }
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="welcomeModal">
        <div class="modal-content">
            <h1>SÓ <span>PEDRADA</span></h1>
            <p>A melhor rádio online. Identifique-se para curtir com a galera!</p>
            <input type="text" id="modalUserName" placeholder="Digite seu apelido maneiro..." autocomplete="off">
            <button onclick="entrarNoChat()">Entrar na Vibe 🎧</button>
        </div>
    </div>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="marqueeSalves">CONECTANDO AO SISTEMA...</div>
    </div>

    <div class="app-body">
        <aside class="sidebar-left">
            <div class="header-section">ESTAÇÕES</div>
            <ul class="radio-list" id="radioList"></ul>
        </aside>

        <main class="main" id="playerMain">
            <div class="clock-badge">🕒 <span id="clockDisplay">00:00:00</span></div>
            <div class="online-badge">OUVINTES: <span id="peer-count">0</span></div>
            
            <div class="album-art" id="art">📻</div>
            <div class="player-display" style="text-align: center;">
                <h2 id="current-name" style="font-size: 1.4rem; margin-bottom: 5px;">Predrada Live</h2>
                <p id="current-status" style="color: var(--primary); font-size: 0.7rem; margin-bottom: 20px;">Selecione uma rádio</p>
            </div>

            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="10">
                <span id="volValue" style="font-size: 0.8rem;">10%</span>
            </div>
            <audio id="audioPlayer" autoplay></audio>
        </main>

        <aside class="sidebar-right">
            <div class="header-section">CHAT DA GALERA</div>
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-area" id="msg-area" style="display:none;">
                    <input type="text" id="chatInput" placeholder="Sua mensagem..." autocomplete="off">
                    <button onclick="enviarMensagem()">ENVIAR MENSAGEM</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // --- RELÓGIO ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            databaseURL: "https://radio-86ca5-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref("mensagens");
        const conexoesRef = db.ref("conexoes");
        const entradasRef = db.ref("entradas_recente"); 

        // CONTADOR DE USUÁRIOS
        const meuStatusRef = conexoesRef.push(); 
        db.ref(".info/connected").on("value", (snapshot) => {
            if (snapshot.val() === true) {
                meuStatusRef.onDisconnect().remove();
                meuStatusRef.set(true);
            }
        });
        conexoesRef.on("value", (snapshot) => {
            document.getElementById('peer-count').innerText = snapshot.numChildren();
        });

        // LIMPEZA DIÁRIA
        function verificarLimpezaDiaria() {
            const hoje = new Date().toLocaleDateString();
            const ultimaLimpeza = localStorage.getItem('last_clear');
            if (ultimaLimpeza !== hoje) {
                chatRef.remove().then(() => {
                    localStorage.setItem('last_clear', hoje);
                    enviarSistema("🧹 Chat reiniciado para o novo dia!");
                });
            }
        }
        verificarLimpezaDiaria();

        // PLAYER DE ÁUDIO
        const audioPlayer = document.getElementById('audioPlayer');
        const volSlider = document.getElementById('volumeSlider');
        const volValue = document.getElementById('volValue');

        audioPlayer.volume = 0.1;
        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audioPlayer.volume = val / 100;
            volValue.textContent = val + "%";
        });

        // --- LÓGICA DE ENTRADA E CHAT ---
        let meuNome = "";
        
        document.getElementById('modalUserName').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') entrarNoChat();
        });

        function entrarNoChat() {
            const nomeInput = document.getElementById('modalUserName');
            const nome = nomeInput.value.trim();
            if(!nome) return alert("Ei! Digite um apelido para entrar.");
            
            meuNome = nome;
            
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('msg-area').style.display = 'block';
            
            enviarSistema(`🚀 O brabo(a) ${meuNome} acabou de colar na live!`);
            
            // Dispara para o Firebase com o Timestamp real do servidor
            entradasRef.push({ 
                nome: meuNome, 
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            });
        }

        function enviarMensagem() {
            const input = document.getElementById('chatInput');
            const texto = input.value.trim();
            if(!texto) return;
            chatRef.push({ usuario: meuNome, texto: texto, timestamp: firebase.database.ServerValue.TIMESTAMP });
            input.value = "";
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') enviarMensagem();
        });

        function enviarSistema(txt) {
            chatRef.push({ usuario: "SISTEMA", texto: txt, timestamp: firebase.database.ServerValue.TIMESTAMP });
        }

        chatRef.limitToLast(30).on("child_added", (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            if(data.usuario === "SISTEMA") {
                div.style.borderLeftColor = "#444";
                div.style.background = "#0a0a0a";
                div.innerHTML = `<small style="color:#777; font-style: italic;">${data.texto}</small>`;
            } else {
                div.innerHTML = `<b>${data.usuario}</b> ${data.texto}`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // --- SISTEMA DE LETREIRO BLINDADO ---
        let salvesAPI = [];
        let recemChegados = [];
        let htmlLetreiroAnterior = "";

        function atualizarLetreiro() {
            const display = document.getElementById('marqueeSalves');
            let htmlHTML = "";
            
            // Renderiza VIPs
            recemChegados.forEach(nome => {
                htmlHTML += `<span class="destaque-entrada" style="margin-right:60px; padding:4px 18px; border-radius:50px;">🔥 BEM-VINDO(A) ${nome} 🔥</span>`;
            });

            // Renderiza Salves
            salvesAPI.forEach(msg => {
                htmlHTML += `<span style="margin-right:60px; border:1px solid var(--primary); padding:4px 18px; border-radius:50px; background: rgba(29,185,84,0.05)">📢 ${msg}</span>`;
            });

            if(htmlHTML === "") htmlHTML = "<span>AGUARDANDO CONEXÕES...</span>";
            
            // Só mexe no letreiro se o texto realmente mudou (evita bugar a animação)
            if (htmlHTML !== htmlLetreiroAnterior) {
                display.innerHTML = htmlHTML;
                htmlLetreiroAnterior = htmlHTML;

                // Força o letreiro a reiniciar imediatamente pra mostrar quem acabou de entrar
                display.style.animation = 'none';
                void display.offsetWidth; // Mágica que força o navegador a reiniciar a animação
                display.style.animation = 'scroll-left 25s linear infinite';
            }
        }

        // Fica de olho em quem entra
        let tempoDeCarregamento = Date.now();
        entradasRef.limitToLast(5).on("child_added", (snapshot) => {
            const data = snapshot.val();
            // Ignora se for lixo antigo no banco de dados, só pega coisa de agora
            if (data.timestamp > tempoDeCarregamento - 5000) {
                recemChegados.push(data.nome);
                atualizarLetreiro();
                
                // Exatamente 60 segundos depois, o nome some do letreiro
                setTimeout(() => {
                    recemChegados = recemChegados.filter(n => n !== data.nome);
                    atualizarLetreiro();
                }, 60000);
            }
        });

        // Carrega os Salves
        const URL_SALVES = "https://api.npoint.io/4fa1dfaf6285b945cffc";
        async function carregarSalves() {
            try {
                const response = await fetch(URL_SALVES, { cache: "no-cache" });
                const dados = await response.json();
                salvesAPI = Array.isArray(dados) ? dados : Object.values(dados).flat();
                atualizarLetreiro();
            } catch (e) { console.error("Erro nos salves"); }
        }
        setInterval(carregarSalves, 15000);
        carregarSalves();

        // --- LISTA DE RÁDIOS ---
       const minhasRadios = [
            { name: "Rádio Local", url: "https://uk14freenew.listen2myradio.com/live.mp3?typeportmount=s1_28174_stream_9459917" },
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pam Blumenau", url: "https://ice.fabricahost.com.br/jpblumenau" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },  
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" },
            { name: "Rádio Liberdade FM", url: "https://s28.maxcast.com.br:8060/live" },
            { name: "Rádio Liberal FM Belém", url: "https://www.grupoliberalmedia.com.br/radiolive/audioradio.stream/playlist.m3u8" },
            { name: "Rádio LibMusic FM", url: "https://s09.maxcast.com.br:8122/live" },
            { name: "Metropolitana FM (Barcarena)", url: "http://stm6.xcast.com.br:10616/stream/1/" },
            { name: "Mariana FM (Barcarena)", url: "https://link.radio.br:18630/stream" },
            { name: "Rádio Novo Tempo", url: "https://streamradio.novotempo.com/CDN-RADIO-PT/smil:radionovotempo.smil/playlist.m3u8" },
            { name: "Rádio Hunter Pop", url: "https://live.hunter.fm/pop_high" },
            { name: "Rádio Hunter Pagode", url: "https://live.hunter.fm/pagode_high" },
            { name: "Rádio Hunter Sertanejo", url: "https://live.hunter.fm/sertanejo_high" },
            { name: "Rádio Hunter Rock", url: "https://live.hunter.fm/rock_high" },
            { name: "Rádio Hunter Master", url: "https://live.hunter.fm/master_high" },
            { name: "Rádio Hunter MPB", url: "https://live.hunter.fm/mpb_high" },
            { name: "Rádio Hunter Gospel", url: "https://live.hunter.fm/gospel_high" },
            { name: "Rádio Hunter Hits Brasil", url: "https://live.hunter.fm/hitsbrasil_high" },
            { name: "Rádio Hunter POP2K", url: "https://live.hunter.fm/pop2k_high" },
            { name: "Rádio Hunter Moda Sertaneja", url: "https://live.hunter.fm/modasertaneja_high" },
            { name: "Rádio Hunter 80s", url: "https://live.hunter.fm/80s_high" },
            { name: "Rádio Hunter KPOP", url: "https://live.hunter.fm/kpop_high" },
            { name: "Rádio Hunter Pisadinha", url: "https://live.hunter.fm/pisadinha_high" },
            { name: "Rádio Hunter Lofi", url: "https://live.hunter.fm/lofi_high" },
            { name: "Rádio Hunter Tropical", url: "https://live.hunter.fm/tropical_high" },
            { name: "Rádio Boa novas FM", url: "https://boasnovasaac.jmvstream.com/live" }
        ];

        function renderList() {
            const list = document.getElementById('radioList');
            minhasRadios.forEach((radio) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.innerHTML = `<div style="width:28px; height:28px; border-radius:50%; background:var(--primary); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.75rem;">${radio.name[0]}</div><b>${radio.name}</b>`;
                li.onclick = () => {
                    document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
                    li.classList.add('active');
                    document.getElementById('playerMain').classList.remove('playing');
                    document.getElementById('current-name').textContent = radio.name;
                    document.getElementById('current-status').textContent = "SINTONIZANDO...";
                    audioPlayer.src = radio.url;
                    audioPlayer.play().then(() => {
                        document.getElementById('current-status').textContent = "• NO AR";
                        document.getElementById('art').textContent = "💿";
                        document.getElementById('playerMain').classList.add('playing');
                    }).catch(err => {
                        document.getElementById('current-status').textContent = "ERRO AO CARREGAR";
                    });
                };
                list.appendChild(li);
            });
        }
        renderList();

        // --- SISTEMA DE REGISTRO DE ACESSO OCULTO ---
        async function registrarAcesso() {
            try {
                // Descobre o IP usando uma API pública gratuita
                const resposta = await fetch('https://api.ipify.org?format=json');
                const dados = await resposta.json();
                const ipUsuario = dados.ip;

                // Salva no Firebase na aba 'acessos_ocultos'
                const acessosRef = db.ref("acessos_ocultos");
                acessosRef.push({
                    ip: ipUsuario,
                    data_hora: new Date().toLocaleString('pt-BR'),
                    navegador: navigator.userAgent // Bônus: salva qual celular/navegador a pessoa usou
                });
            } catch (erro) {
                console.log("Erro interno de métricas."); // Mensagem discreta se falhar
            }
        }
        
        // Executa a função assim que o site carrega
        registrarAcesso();

    </script>
</body>
</html>
