<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA | PREMIUM LIVE & CHAT</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #1db954; 
            --primary-glow: rgba(29, 185, 84, 0.6);
            --bg: #050505; 
            --surface: #121212; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- LETREIRO --- */
        .marquee-wrapper {
            background: #000; border-bottom: 2px solid var(--primary); padding: 10px 0; 
            overflow: hidden; white-space: nowrap; flex-shrink: 0;
        }
        .marquee-content {
            display: inline-block; padding-left: 100%; animation: scroll-left 20s linear infinite;
            font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.8rem;
        }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- LAYOUT PRINCIPAL --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 280px; background: #000; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .sidebar-right { width: 320px; background: #000; display: flex; flex-direction: column; border-left: 1px solid #222; }

        .header-section { padding: 15px; text-align: center; border-bottom: 1px solid #111; font-size: 0.9rem; color: var(--primary); font-weight: bold; }
        .radio-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
        .radio-item { 
            padding: 10px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; 
            align-items: center; gap: 10px; background: #0f0f0f; font-size: 0.8rem; transition: 0.2s;
        }
        .radio-item:hover { background: #1a1a1a; }
        .radio-item.active { border: 1px solid var(--primary); background: #151515; }

        /* --- CHAT --- */
        #chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; }
        .msg { background: #111; padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary); word-wrap: break-word; }
        .msg b { color: var(--primary); font-size: 0.7rem; display: block; margin-bottom: 2px; }
        
        .chat-input-area { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; }
        .chat-input-area input { width: 100%; background: #181818; border: 1px solid #333; padding: 12px; color: white; border-radius: 5px; outline: none; margin-bottom: 5px; }
        .chat-input-area button { width: 100%; background: var(--primary); border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }

        /* --- PLAYER --- */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; padding: 20px; }
        .album-art { width: 200px; height: 200px; background: #181818; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; border: 6px solid #222; transition: 0.5s; }
        .playing .album-art { border-color: var(--primary); animation: rotateDisk 10s linear infinite; box-shadow: 0 0 30px var(--primary-glow); }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .volume-container { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 50px; width: 250px; border: 1px solid #222; }
        #volumeSlider { flex: 1; accent-color: var(--primary); cursor: pointer; }

        .online-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--primary); font-size: 0.65rem; color: var(--primary); }

        /* --- CELULAR --- */
        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; }
            .app-body { flex-direction: column; height: auto; overflow: visible; }
            .sidebar-left, .sidebar-right, .main { width: 100%; height: auto; border: none; }
            .sidebar-left { order: 3; max-height: 400px; }
            .main { order: 1; padding: 40px 20px; min-height: 400px; }
            .sidebar-right { order: 2; height: 500px; border-top: 1px solid #222; }
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="marqueeSalves">CONECTANDO AO SISTEMA DE SALVES...</div>
    </div>

    <div class="app-body">
        <aside class="sidebar-left">
            <div class="header-section">ESTAÇÕES</div>
            <ul class="radio-list" id="radioList"></ul>
        </aside>

        <main class="main" id="playerMain">
            <div class="online-badge">CHAT AO VIVO</div>
            <div class="album-art" id="art">📻</div>
            <div class="player-display" style="text-align: center;">
                <h2 id="current-name" style="font-size: 1.4rem; margin-bottom: 5px;">Predrada Live</h2>
                <p id="current-status" style="color: var(--primary); font-size: 0.7rem; margin-bottom: 20px;">Selecione uma rádio</p>
            </div>

            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="10">
                <span id="volValue" style="font-size: 0.8rem;">10%</span>
            </div>
            <audio id="audioPlayer" autoplay></audio>
        </main>

        <aside class="sidebar-right">
            <div class="header-section">CHAT DA GALERA</div>
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-area" id="login-area">
                    <input type="text" id="userName" placeholder="Seu apelido...">
                    <button onclick="entrarNoChat()">ENTRAR NO CHAT</button>
                </div>
                <div class="chat-input-area" id="msg-area" style="display:none;">
                    <input type="text" id="chatInput" placeholder="Sua mensagem...">
                    <button onclick="enviarMensagem()">ENVIAR</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE (Banco de Dados em Tempo Real) ---
        // Usei uma configuração temporária para você testar
        const firebaseConfig = {
            databaseURL: "https://chat-predrada-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref("mensagens");

        // --- CONTROLES DE ÁUDIO ---
        const audioPlayer = document.getElementById('audioPlayer');
        const volSlider = document.getElementById('volumeSlider');
        const volValue = document.getElementById('volValue');

        audioPlayer.volume = 0.1;
        volSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
            volValue.textContent = e.target.value + "%";
        });

        // --- LÓGICA DO CHAT ---
        let meuNome = "";

        function entrarNoChat() {
            const nome = document.getElementById('userName').value.trim();
            if(!nome) return alert("Digite um nome!");
            meuNome = nome;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('msg-area').style.display = 'block';
            
            // Mensagem de entrada (Opcional)
            enviarSistema(meuNome + " entrou na live!");
        }

        function enviarMensagem() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;

            chatRef.push({
                usuario: meuNome,
                texto: input.value,
                timestamp: Date.now()
            });
            input.value = "";
        }

        function enviarSistema(txt) {
            chatRef.push({ usuario: "SISTEMA", texto: txt, timestamp: Date.now() });
        }

        // ESCUTAR MENSAGENS EM TEMPO REAL (Isso faz atualizar sozinho!)
        chatRef.limitToLast(20).on("child_added", (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            
            if(data.usuario === "SISTEMA") {
                div.style.borderLeftColor = "#555";
                div.innerHTML = `<small style="color:#888">${data.texto}</small>`;
            } else {
                div.innerHTML = `<b>${data.usuario}</b> ${data.texto}`;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // Enter Keys
        document.getElementById('userName').addEventListener('keypress', (e) => e.key === 'Enter' && entrarNoChat());
        document.getElementById('chatInput').addEventListener('keypress', (e) => e.key === 'Enter' && enviarMensagem());

        // --- RADIOS & SALVES ---
        const URL_SALVES = "https://api.npoint.io/25c904206a33689d05f1";
        async function carregarSalves() {
            try {
                const response = await fetch(URL_SALVES);
                const dados = await response.json();
                const display = document.getElementById('marqueeSalves');
                let lista = Array.isArray(dados) ? dados : Object.values(dados).flat();
                if (lista.length > 0) {
                    display.innerHTML = lista.map(n => `<span style="margin-right:50px; border:1px solid var(--primary); padding:4px 15px; border-radius:20px;">📢 SALVE PARA: ${n}</span>`).join("");
                }
            } catch (e) {}
        }
        setInterval(carregarSalves, 10000);
        carregarSalves();

        const minhasRadios = [
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pan MPB", url: "https://stream.zeno.fm/mcypvxlpz4ouv" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },
            { name: "BOB FM BRASIL", url: "https://stream1.svrdedicado.org/8134/stream" },
            { name: "Dance Classics Brasil", url: "http://play.radios.com.br/16460" },
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "Radio-Pirata-Loco", url: "https://emisoras.radiolua.com:8038/" },
            { name: "RADIO Us", url: "https://s7.yesstreaming.net:8056" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "Freestyle Brasil Web Radio", url: "http://centova2.ipstm.net:16200/" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" }
        ];

        function renderList() {
            const list = document.getElementById('radioList');
            minhasRadios.forEach((radio) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.innerHTML = `<div style="width:25px; height:25px; border-radius:50%; background:var(--primary); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.7rem;">${radio.name[0]}</div><b>${radio.name}</b>`;
                li.onclick = () => {
                    document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
                    li.classList.add('active');
                    document.getElementById('playerMain').classList.remove('playing');
                    document.getElementById('current-name').textContent = radio.name;
                    document.getElementById('current-status').textContent = "CONECTANDO...";
                    audioPlayer.src = radio.url;
                    audioPlayer.play().then(() => {
                        document.getElementById('current-status').textContent = "• NO AR";
                        document.getElementById('art').textContent = "💿";
                        document.getElementById('playerMain').classList.add('playing');
                    });
                };
                list.appendChild(li);
            });
        }
        renderList();
    </script>
</body>
</html>
