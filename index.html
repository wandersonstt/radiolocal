<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #1db954; 
            --primary-glow: rgba(29, 185, 84, 0.6);
            --bg: #050505; 
            --surface: #121212; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- MODAL DE LOGIN (JANELA INICIAL) --- */
        #login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #111; padding: 30px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center;
            width: 90%; max-width: 400px; box-shadow: 0 0 30px var(--primary-glow);
        }
        .modal-content h2 { color: var(--primary); margin-bottom: 10px; }
        .modal-content p { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
        .modal-content input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333;
            background: #000; color: #fff; outline: none; margin-bottom: 15px; text-align: center;
        }
        .modal-content button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: var(--primary); color: #000; font-weight: bold; cursor: pointer;
        }

        /* --- BARRA DE ROLAGEM --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #252525; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- LETREIRO --- */
        .marquee-wrapper { background: #000; border-bottom: 2px solid var(--primary); padding: 10px 0; overflow: hidden; flex-shrink: 0; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 20s linear infinite; font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- LAYOUT --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 280px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-right { width: 320px; background: #000; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .header-section { padding: 15px; text-align: center; border-bottom: 1px solid #111; font-size: 0.9rem; color: var(--primary); font-weight: bold; }
        .radio-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
        .radio-item { padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: #0f0f0f; font-size: 0.8rem; border: 1px solid transparent; }
        .radio-item:hover { background: #1a1a1a; }
        .radio-item.active { border-color: var(--primary); background: #151515; }

        /* --- PLAYER --- */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        .clock-badge { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; backdrop-filter: blur(5px); }
        .online-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--primary); font-size: 0.65rem; color: var(--primary); }
        .album-art { width: 200px; height: 200px; background: #181818; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; border: 6px solid #222; }
        .playing .album-art { border-color: var(--primary); animation: rotateDisk 10s linear infinite; box-shadow: 0 0 30px var(--primary-glow); }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .volume-container { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 50px; width: 250px; }
        #volumeSlider { flex: 1; accent-color: var(--primary); }

        /* --- CHAT --- */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; }
        .msg { background: #111; padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary); }
        .msg b { color: var(--primary); display: block; font-size: 0.7rem; text-transform: uppercase; }
        .chat-input-area { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; }
        .chat-input-area input { width: 100%; background: #181818; border: 1px solid #333; padding: 12px; color: white; border-radius: 5px; outline: none; }

        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; }
            .app-body { flex-direction: column; }
            .sidebar-left, .sidebar-right, .main { width: 100%; height: auto; }
            .main { padding: 60px 20px; min-height: 400px; }
            .sidebar-right { height: 500px; }
        }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="modal-content">
            <h2>Bem-vindo! 🎧</h2>
            <p>Escolha um apelido para curtir a rádio e entrar no chat.</p>
            <input type="text" id="modalUserName" placeholder="Digite seu nome..." maxlength="15">
            <button onclick="realizarLogin()">ENTRAR NA RÁDIO</button>
        </div>
    </div>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="marqueeSalves">CONECTANDO AO SISTEMA...</div>
    </div>

    <div class="app-body">
        <aside class="sidebar-left">
            <div class="header-section">ESTAÇÕES</div>
            <ul class="radio-list" id="radioList"></ul>
        </aside>

        <main class="main" id="playerMain">
            <div class="clock-badge">🕒 <span id="clockDisplay" style="color: #fff;">00:00:00</span></div>
            <div class="online-badge">OUVINTES: <span id="peer-count">0</span></div>
            <div class="album-art" id="art">📻</div>
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 id="current-name">Predrada Live</h2>
                <p id="current-status" style="color: var(--primary); font-size: 0.7rem;">Selecione uma rádio</p>
            </div>
            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="10">
                <span id="volValue" style="font-size: 0.8rem;">10%</span>
            </div>
            <audio id="audioPlayer" autoplay></audio>
        </main>

        <aside class="sidebar-right">
            <div class="header-section">CHAT DA GALERA</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Sua mensagem...">
            </div>
        </aside>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = { databaseURL: "https://radio-86ca5-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref("mensagens");
        const conexoesRef = db.ref("conexoes");
        const acessosRef = db.ref("acessos_ocultos");

        let meuNome = "";

        // --- RELÓGIO ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);

        // --- LOGIN E ACESSO ---
        async function realizarLogin() {
            const input = document.getElementById('modalUserName');
            const nome = input.value.trim();
            
            if (nome.length < 3) {
                alert("Por favor, digite um nome com pelo menos 3 letras.");
                return;
            }

            meuNome = nome;
            document.getElementById('login-modal').style.display = 'none';

            // 1. Registra no chat
            enviarSistema(`🎧 ${meuNome} entrou na rádio agora!`);

            // 2. Registra IP de forma oculta (seu pedido anterior)
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const dados = await resp.json();
                acessosRef.push({
                    usuario: meuNome,
                    ip: dados.ip,
                    data: new Date().toLocaleString('pt-BR'),
                    navegador: navigator.userAgent
                });
            } catch (e) { console.log("Métrica silenciosa."); }

            // 3. Ativa o contador de presença
            const statusRef = conexoesRef.push();
            statusRef.onDisconnect().remove();
            statusRef.set(true);
        }

        // --- CONTADOR ONLINE ---
        conexoesRef.on("value", (snap) => {
            document.getElementById('peer-count').innerText = snap.numChildren();
        });

        // --- CHAT LÓGICA ---
        function enviarMensagem() {
            const input = document.getElementById('chatInput');
            const texto = input.value.trim();
            if (!texto || !meuNome) return;
            chatRef.push({ usuario: meuNome, texto: texto, timestamp: Date.now() });
            input.value = "";
        }

        function enviarSistema(txt) {
            chatRef.push({ usuario: "SISTEMA", texto: txt, timestamp: Date.now() });
        }

        chatRef.limitToLast(30).on("child_added", (snap) => {
            const data = snap.val();
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            if(data.usuario === "SISTEMA") {
                div.style.borderLeftColor = "#444";
                div.innerHTML = `<small style="color:#777; font-style:italic;">${data.texto}</small>`;
            } else {
                div.innerHTML = `<b>${data.usuario}</b> ${data.texto}`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        document.getElementById('chatInput').addEventListener('keypress', (e) => e.key === 'Enter' && enviarMensagem());

        // --- PLAYER E RADIOS ---
        const audioPlayer = document.getElementById('audioPlayer');
        const volSlider = document.getElementById('volumeSlider');
        audioPlayer.volume = 0.1;

        volSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
            document.getElementById('volValue').textContent = e.target.value + "%";
        });

       const minhasRadios = [
            { name: "Rádio Local", url: "https://uk14freenew.listen2myradio.com/live.mp3?typeportmount=s1_28174_stream_9459917" },
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pam Blumenau", url: "https://ice.fabricahost.com.br/jpblumenau" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },  
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" },
            { name: "Rádio Liberdade FM", url: "https://s28.maxcast.com.br:8060/live" },
            { name: "Rádio Liberal FM Belém", url: "https://www.grupoliberalmedia.com.br/radiolive/audioradio.stream/playlist.m3u8" },
            { name: "Rádio LibMusic FM", url: "https://s09.maxcast.com.br:8122/live" },
            { name: "Metropolitana FM (Barcarena)", url: "http://stm6.xcast.com.br:10616/stream/1/" },
            { name: "Mariana FM (Barcarena)", url: "https://link.radio.br:18630/stream" },
            { name: "Rádio Novo Tempo", url: "https://streamradio.novotempo.com/CDN-RADIO-PT/smil:radionovotempo.smil/playlist.m3u8" },
            { name: "Rádio Hunter Pop", url: "https://live.hunter.fm/pop_high" },

            { name: "Rádio Hunter Sertanejo", url: "https://live.hunter.fm/sertanejo_high" },
            { name: "Rádio Hunter Rock", url: "https://live.hunter.fm/rock_high" },
            { name: "Rádio Hunter Master", url: "https://live.hunter.fm/master_high" },
            { name: "Rádio Hunter MPB", url: "https://live.hunter.fm/mpb_high" },
            { name: "Rádio Hunter Gospel", url: "https://live.hunter.fm/gospel_high" },
            { name: "Rádio Hunter Hits Brasil", url: "https://live.hunter.fm/hitsbrasil_high" },
            { name: "Rádio Hunter POP2K", url: "https://live.hunter.fm/pop2k_high" },
            { name: "Rádio Hunter Moda Sertaneja", url: "https://live.hunter.fm/modasertaneja_high" },
            { name: "Rádio Hunter 80s", url: "https://live.hunter.fm/80s_high" },
            { name: "Rádio Hunter KPOP", url: "https://live.hunter.fm/kpop_high" },
            { name: "Rádio Hunter Pisadinha", url: "https://live.hunter.fm/pisadinha_high" },
            { name: "Rádio Hunter Lofi", url: "https://live.hunter.fm/lofi_high" },
            { name: "Rádio Hunter Tropical", url: "https://live.hunter.fm/tropical_high" },
            { name: "Rádio Boa novas FM", url: "https://boasnovasaac.jmvstream.com/live" }
        ];

        function renderList() {
            const list = document.getElementById('radioList');
            minhasRadios.forEach((radio) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.innerHTML = `<div style="width:25px; height:25px; border-radius:50%; background:var(--primary); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.6rem;">${radio.name[0]}</div><b>${radio.name}</b>`;
                li.onclick = () => {
                    document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
                    li.classList.add('active');
                    document.getElementById('playerMain').classList.remove('playing');
                    document.getElementById('current-name').textContent = radio.name;
                    document.getElementById('current-status').textContent = "SINTONIZANDO...";
                    audioPlayer.src = radio.url;
                    audioPlayer.play().then(() => {
                        document.getElementById('current-status').textContent = "• NO AR";
                        document.getElementById('playerMain').classList.add('playing');
                    });
                };
                list.appendChild(li);
            });
        }
        renderList();

        // --- SALVES ---
        async function carregarSalves() {
            try {
                const response = await fetch("https://api.npoint.io/4fa1dfaf6285b945cffc");
                const dados = await response.json();
                const display = document.getElementById('marqueeSalves');
                let lista = Array.isArray(dados) ? dados : Object.values(dados).flat();
                display.innerHTML = lista.map(n => `<span style="margin-right:50px;">📢 ${n}</span>`).join("");
            } catch (e) { }
        }
        setInterval(carregarSalves, 20000);
        carregarSalves();
    </script>
</body>
</html>
