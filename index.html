<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA | PREMIUM LIVE</title>
    <style>
        :root { 
            --primary: #1db954; 
            --primary-glow: rgba(29, 185, 84, 0.6);
            --bg: #050505; 
            --surface: #121212; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- LETREIRO DINÂMICO --- */
        .marquee-wrapper {
            background: #000;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 100;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%; 
            animation: scroll-left 20s linear infinite;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); } 
        }

        .salve-tag {
            background: rgba(29, 185, 84, 0.15);
            padding: 5px 18px;
            border-radius: 50px;
            margin-right: 40px;
            border: 1px solid var(--primary);
            display: inline-block;
            box-shadow: inset 0 0 10px rgba(29, 185, 84, 0.2);
        }

        /* --- LAYOUT --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { 
            width: 320px; 
            background-color: #000; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #222;
        }
        
        .header-list { padding: 25px; text-align: center; border-bottom: 1px solid #111; }
        .header-list h2 { font-size: 1.2rem; color: var(--primary); letter-spacing: 2px; }

        .radio-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            list-style: none; 
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #000;
        }

        .radio-item { 
            padding: 15px; 
            margin-bottom: 8px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: #0f0f0f; 
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .radio-item:hover { background: #1a1a1a; transform: translateX(5px); }
        .radio-item.active { border-color: var(--primary); background: #151515; }
        
        .radio-icon { 
            width: 40px; height: 40px; border-radius: 50%; background: var(--primary); 
            display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; 
        }

        /* --- PLAYER --- */
        .main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .album-art { 
            width: 280px; height: 280px; 
            background: #181818; 
            border-radius: 50%; 
            margin-bottom: 30px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 6rem; 
            border: 10px solid #222;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            transition: 0.5s;
        }

        .playing .album-art { 
            border-color: var(--primary); 
            animation: rotateDisk 10s linear infinite;
            box-shadow: 0 0 40px var(--primary-glow);
        }

        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-display h2 { font-size: 2.2rem; margin-bottom: 5px; font-weight: 800; }
        .player-display p { color: var(--primary); letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 35px; }

        /* Volume Custom */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 12px 25px;
            border-radius: 50px;
            width: 320px;
            border: 1px solid #222;
        }

        #volumeSlider {
            flex: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        #volValue { font-size: 0.85rem; font-weight: bold; width: 40px; color: var(--primary); text-align: right;}

        audio { display: none; }

        @media (max-width: 768px) {
            .app-body { flex-direction: column; }
            .sidebar { width: 100%; height: 35%; }
            .album-art { width: 180px; height: 180px; font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="marqueeSalves">SINTONIZANDO SALVES...</div>
    </div>

    <div class="app-body">
        <aside class="sidebar">
            <div class="header-list"><h2>STATIONS</h2></div>
            <ul class="radio-list" id="radioList"></ul>
        </aside>

        <main class="main" id="playerMain">
            <div class="album-art" id="art">📻</div>
            <div class="player-display" style="text-align: center;">
                <h2 id="current-name">Predrada Live</h2>
                <p id="current-status">Escolha uma estação</p>
            </div>

            <div class="volume-container">
                <span style="font-size: 1.1rem;">🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="10">
                <span id="volValue">10%</span>
            </div>
            <audio id="audioPlayer" autoplay></audio>
        </main>
    </div>

    <script>
        // --- SEU LINK DO NPOINT.IO ---
        const URL_SALVES = "https://api.npoint.io/25c904206a33689d05f1";

        const audioPlayer = document.getElementById('audioPlayer');
        const volSlider = document.getElementById('volumeSlider');
        const volValue = document.getElementById('volValue');

        // Configuração de Volume Inicial (10%)
        audioPlayer.volume = 0.1;
        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audioPlayer.volume = val / 100;
            volValue.textContent = val + "%";
        });

        // FUNÇÃO DE SALVES EM TEMPO REAL
        async function carregarSalves() {
            try {
                const response = await fetch(URL_SALVES);
                if (!response.ok) throw new Error();
                
                // O npoint retorna um objeto ou array JSON
                const listaNomes = await response.json();
                
                // Se o seu npoint tiver uma lista de nomes ["nome1", "nome2"]
                if (Array.isArray(listaNomes) && listaNomes.length > 0) {
                    const display = document.getElementById('marqueeSalves');
                    const novoConteudo = listaNomes.map(nome => `<span class="salve-tag">📢 SALVE: ${nome}</span>`).join("");
                    
                    if (display.innerHTML !== novoConteudo) {
                        display.innerHTML = novoConteudo;
                    }
                }
            } catch (e) { console.warn("Erro ao buscar salves..."); }
        }

        // Verifica a cada 3 segundos
        setInterval(carregarSalves, 3000);
        carregarSalves();

        const minhasRadios = [
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pan MPB", url: "https://stream.zeno.fm/mcypvxlpz4ouv" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },
            { name: "BOB FM BRASIL", url: "https://stream1.svrdedicado.org/8134/stream" },
            { name: "Dance Classics Brasil", url: "http://play.radios.com.br/16460" },
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "Radio-Pirata-Loco", url: "https://emisoras.radiolua.com:8038/" },
            { name: "RADIO Us", url: "https://s7.yesstreaming.net:8056" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "Freestyle Brasil Web Radio", url: "http://centova2.ipstm.net:16200/" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" }
        ];

        function renderList() {
            const list = document.getElementById('radioList');
            minhasRadios.forEach((radio) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.innerHTML = `<div class="radio-icon">${radio.name[0]}</div><div><b>${radio.name}</b><br><small>AO VIVO</small></div>`;
                li.onclick = () => playRadio(radio, li);
                list.appendChild(li);
            });
        }

        function playRadio(radio, li) {
            document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            li.classList.add('active');
            const playerMain = document.getElementById('playerMain');
            playerMain.classList.remove('playing');
            document.getElementById('current-name').textContent = radio.name;
            document.getElementById('current-status').textContent = "CONECTANDO...";
            
            audioPlayer.src = radio.url;
            audioPlayer.play().then(() => {
                document.getElementById('current-status').textContent = "• TOCANDO AGORA";
                document.getElementById('art').textContent = "💿";
                playerMain.classList.add('playing');
            }).catch(() => {
                document.getElementById('current-status').textContent = "OFFLINE";
                document.getElementById('art').textContent = "❌";
            });
        }

        renderList();
    </script>
</body>
</html>
