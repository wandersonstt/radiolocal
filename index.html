<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA</title>
    <style>
        :root { --primary: #1db954; --bg: #121212; --surface: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background-color: #000; display: flex; flex-direction: column; border-right: 1px solid #282828; }
        .header-list { padding: 20px; border-bottom: 1px solid #282828; text-align: center; }
        .header-list h2 { font-size: 1.2rem; color: var(--primary); }

        .radio-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
        .radio-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; background: #181818; transition: 0.2s; border: 1px solid transparent; }
        .radio-item:hover { background: #282828; transform: scale(1.02); }
        .radio-item.active { background: #282828; border-color: var(--primary); }
        
        .radio-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: black; font-weight: bold; }

        /* Main Player */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1e1e1e 0%, #000 100%); }
        .player-display { text-align: center; width: 90%; max-width: 400px; }
        
        .album-art { width: 220px; height: 220px; background: #282828; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 5rem; box-shadow: 0 15px 50px rgba(0,0,0,0.8); border: 2px solid #333; }
        
        h2#current-name { margin-bottom: 5px; font-size: 1.8rem; }
        p#current-status { color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin-bottom: 20px; }
        
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header-list">
            <h2>Minhas Estações</h2>
            <small style="color: #888;">Lista Personalizada</small>
        </div>
        <ul class="radio-list" id="radioList">
            </ul>
    </aside>

    <main class="main">
        <div class="player-display">
            <div class="album-art" id="art">📻</div>
            <h2 id="current-name">Pronto para tocar</h2>
            <p id="current-status">Selecione uma rádio na lista</p>
            <audio id="audioPlayer" controls autoplay></audio>
        </div>
    </main>

    <script>
        // SUA LISTA DE RÁDIOS
        const minhasRadios = [
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pan MPB", url: "https://stream.zeno.fm/mcypvxlpz4ouv" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://ouvindo.net.br/play/top-one/3a1173124cb2d082f9ae5fa9429726b0/000000/ffffff/" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },
            { name: "BOB FM BRASIL", url: "https://stream1.svrdedicado.org/8134/stream" },
            { name: "Dance Classics Brasil", url: "https://server07.srvsh.com.br:7252" }, // Ajustado para stream direto
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" }
        ];

        const audioPlayer = document.getElementById('audioPlayer');
        const radioList = document.getElementById('radioList');
        const currentName = document.getElementById('current-name');
        const currentStatus = document.getElementById('current-status');
        const art = document.getElementById('art');

        function renderList() {
            minhasRadios.forEach((radio, index) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.innerHTML = `
                    <div class="radio-icon">${radio.name.charAt(0)}</div>
                    <div style="overflow:hidden">
                        <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis;">${radio.name}</div>
                        <small style="color:#666">Ao Vivo</small>
                    </div>
                `;

                li.onclick = () => {
                    playRadio(radio, li);
                };
                radioList.appendChild(li);
            });
        }

        function playRadio(radio, element) {
            // Reset visual
            document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            // Atualiza Player
            currentName.textContent = radio.name;
            currentStatus.textContent = "Conectando...";
            art.textContent = "📡";
            art.style.color = "var(--primary)";

            audioPlayer.src = radio.url;
            audioPlayer.play()
                .then(() => {
                    currentStatus.textContent = "• TOCANDO AGORA";
                    art.textContent = "🎵";
                })
                .catch(e => {
                    currentStatus.textContent = "ERRO: LINK OFFLINE OU BLOQUEADO";
                    art.textContent = "❌";
                });
        }

        // Iniciar a lista
        renderList();
    </script>
</body>
</html>
