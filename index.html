<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO PREDRADA | PREMIUM LIVE & CHAT</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
:root { 
    --primary: #1db954; 
    --bg: #050505; 
    --text: #fff; 
}

body { margin:0; font-family: Arial; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }

.app-body { display:flex; flex:1; }

.sidebar-left, .sidebar-right { width:280px; background:#000; overflow:auto; }
.main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }

.online-badge {
    position:absolute; top:10px; right:10px;
    border:1px solid var(--primary);
    padding:5px 10px; border-radius:20px;
    font-size:12px; color:var(--primary);
}

#chat-messages { height:300px; overflow:auto; padding:10px; }
.msg { background:#111; margin-bottom:5px; padding:8px; border-left:3px solid var(--primary); }

.chat-input-area input, .chat-input-area button { width:100%; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<div class="app-body">

<aside class="sidebar-left">
    <h3>RADIOS</h3>
    <ul id="radioList"></ul>
</aside>

<main class="main">
    <div class="online-badge">
        👥 <span id="onlineCount">0</span> online
    </div>

    <h2 id="current-name">Predrada Live</h2>
    <p id="current-status">Selecione uma rádio</p>

    <audio id="audioPlayer" autoplay></audio>
</main>

<aside class="sidebar-right">
    <h3>CHAT</h3>

    <div id="chat-messages"></div>

    <div id="login-area" class="chat-input-area">
        <input type="text" id="userName" placeholder="Seu nome">
        <button onclick="entrarNoChat()">Entrar</button>
    </div>

    <div id="msg-area" class="chat-input-area" style="display:none;">
        <input type="text" id="chatInput" placeholder="Mensagem">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

</aside>

</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
    databaseURL: "https://chat-predrada-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const chatRef = db.ref("mensagens");
const onlineRef = db.ref("onlineUsers");

// 🎧 PLAYER
const audioPlayer = document.getElementById('audioPlayer');

// 🔒 SEGURANÇA
function escapeHTML(str) {
    return str.replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
    })[m]);
}

// 👤 USUÁRIO
let meuNome = "";
let ultimoEnvio = 0;

// 🚀 ENTRAR
function entrarNoChat(){
    const nome = document.getElementById('userName').value.trim();

    if(nome.length < 3 || nome.length > 20){
        return alert("Nome entre 3 e 20 caracteres");
    }

    meuNome = nome;

    document.getElementById('login-area').style.display = 'none';
    document.getElementById('msg-area').style.display = 'block';

    // presença online
    const myUser = onlineRef.push();
    myUser.set(true);
    myUser.onDisconnect().remove();

    enviarSistema(meuNome + " entrou 🔥");
}

// 📩 ENVIAR MSG
function enviarMensagem(){
    const agora = Date.now();

    if(agora - ultimoEnvio < 2000){
        return alert("Aguarde 2 segundos");
    }

    const input = document.getElementById('chatInput');
    if(!input.value.trim()) return;

    if(input.value.length > 200){
        return alert("Mensagem muito longa");
    }

    chatRef.push({
        usuario: meuNome,
        texto: input.value.trim(),
        timestamp: agora
    });

    ultimoEnvio = agora;
    input.value = "";
}

// 🤖 SISTEMA
function enviarSistema(txt){
    chatRef.push({
        usuario:"SISTEMA",
        texto:txt,
        timestamp:Date.now()
    });
}

// 📡 CHAT TEMPO REAL
chatRef.limitToLast(50).on("child_added", snapshot => {
    const data = snapshot.val();
    const box = document.getElementById('chat-messages');

    const div = document.createElement('div');
    div.className = 'msg';

    if(data.usuario === "SISTEMA"){
        div.innerHTML = `<small>${escapeHTML(data.texto)}</small>`;
    } else {
        div.innerHTML = `<b>${escapeHTML(data.usuario)}</b> ${escapeHTML(data.texto)}`;
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
});

// 👥 CONTADOR ONLINE
onlineRef.on("value", snap => {
    document.getElementById("onlineCount").textContent = snap.numChildren();
});

// 🎵 RADIOS
const minhasRadios = [
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pan MPB", url: "https://stream.zeno.fm/mcypvxlpz4ouv" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },
            { name: "BOB FM BRASIL", url: "https://stream1.svrdedicado.org/8134/stream" },
            { name: "Dance Classics Brasil", url: "http://play.radios.com.br/16460" },
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "Radio-Pirata-Loco", url: "https://emisoras.radiolua.com:8038/" },
            { name: "RADIO Us", url: "https://s7.yesstreaming.net:8056" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "Freestyle Brasil Web Radio", url: "http://centova2.ipstm.net:16200/" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" }
        ];
function renderList(){
    const list = document.getElementById('radioList');

    radios.forEach(radio => {
        const li = document.createElement('li');
        li.innerText = radio.name;

        li.onclick = () => {
            audioPlayer.src = radio.url;
            audioPlayer.play();
            document.getElementById('current-name').innerText = radio.name;
            document.getElementById('current-status').innerText = "● AO VIVO";
        };

        list.appendChild(li);
    });
}

renderList();

// ⌨ ENTER
document.getElementById('userName').addEventListener('keypress', e=>{
    if(e.key==="Enter") entrarNoChat();
});
document.getElementById('chatInput').addEventListener('keypress', e=>{
    if(e.key==="Enter") enviarMensagem();
});

</script>
</body>
</html>
