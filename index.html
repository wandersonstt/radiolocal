<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA | PREMIUM LIVE & CHAT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --primary: #1db954; 
            --primary-glow: rgba(29, 185, 84, 0.6);
            --bg: #050505; 
            --surface: #121212; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- LETREIRO DINÂMICO --- */
        .marquee-wrapper {
            background: #000; border-bottom: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow);
            padding: 12px 0; overflow: hidden; white-space: nowrap; z-index: 100;
        }
        .marquee-content {
            display: inline-block; padding-left: 100%; animation: scroll-left 20s linear infinite;
            font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.85rem; text-shadow: 0 0 8px var(--primary-glow);
        }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .salve-tag {
            background: rgba(29, 185, 84, 0.15); padding: 5px 18px; border-radius: 50px;
            margin-right: 40px; border: 1px solid var(--primary); display: inline-block;
        }

        /* --- LAYOUT --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar-left { 
            width: 280px; background-color: #000; display: flex; flex-direction: column; border-right: 1px solid #222;
        }
        
        .sidebar-right { 
            width: 300px; background-color: #000; display: flex; flex-direction: column; border-left: 1px solid #222;
        }

        .header-section { padding: 15px; text-align: center; border-bottom: 1px solid #111; font-size: 0.9rem; color: var(--primary); font-weight: bold; }

        .radio-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
        .radio-item { 
            padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; 
            align-items: center; gap: 10px; background: #0f0f0f; transition: 0.3s; font-size: 0.8rem;
        }
        .radio-item:hover { background: #1a1a1a; }
        .radio-item.active { border-color: var(--primary); background: #151515; border: 1px solid var(--primary); }
        .radio-icon { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

        /* --- CHAT P2P --- */
        #chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; }
        .msg { background: #111; padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--primary); }
        .msg b { color: var(--primary); display: block; font-size: 0.7rem; }
        
        .chat-input-area { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; }
        .chat-input-area input { width: 100%; background: #181818; border: 1px solid #333; padding: 10px; color: white; border-radius: 5px; outline: none; margin-bottom: 5px; }
        .chat-input-area button { width: 100%; background: var(--primary); border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* --- PLAYER CENTRAL --- */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        .album-art { width: 220px; height: 220px; background: #181818; border-radius: 50%; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; font-size: 5rem; border: 8px solid #222; transition: 0.5s; }
        .playing .album-art { border-color: var(--primary); animation: rotateDisk 10s linear infinite; box-shadow: 0 0 40px var(--primary-glow); }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .volume-container { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; width: 280px; border: 1px solid #222; }
        #volumeSlider { flex: 1; accent-color: var(--primary); cursor: pointer; }
        #volValue { font-size: 0.8rem; width: 35px; }

        .online-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--primary); font-size: 0.7rem; color: var(--primary); }

        @media (max-width: 1000px) {
            .sidebar-right { display: none; }
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="marqueeSalves">SINTONIZANDO SALVES...</div>
    </div>

    <div class="app-body">
        <aside class="sidebar-left">
            <div class="header-section">ESTAÇÕES</div>
            <ul class="radio-list" id="radioList"></ul>
        </aside>

        <main class="main" id="playerMain">
            <div class="online-badge">OUVINTES: <span id="peer-count">1</span></div>
            <div class="album-art" id="art">📻</div>
            <div class="player-display" style="text-align: center;">
                <h2 id="current-name" style="font-size: 1.5rem; margin-bottom: 5px;">Predrada Live</h2>
                <p id="current-status" style="color: var(--primary); font-size: 0.7rem; margin-bottom: 25px;">Selecione uma rádio</p>
            </div>

            <div class="volume-container">
                <span style="font-size: 1rem;">🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="10">
                <span id="volValue">10%</span>
            </div>
            <audio id="audioPlayer" autoplay></audio>
        </main>

        <aside class="sidebar-right">
            <div class="header-section">CHAT AO VIVO</div>
            <div id="chat-container">
                <div id="chat-messages">
                    <div class="msg"><b>Sistema</b> Bem-vindo! Digite seu nome abaixo para conversar.</div>
                </div>
                <div class="chat-input-area" id="login-area">
                    <input type="text" id="userName" placeholder="Seu apelido...">
                    <button onclick="conectarAoChat()">ENTRAR NO CHAT</button>
                </div>
                <div class="chat-input-area" id="msg-area" style="display:none;">
                    <input type="text" id="chatInput" placeholder="Sua mensagem...">
                    <button onclick="enviarMensagem()">ENVIAR</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const URL_SALVES = "https://api.npoint.io/25c904206a33689d05f1";
        const audioPlayer = document.getElementById('audioPlayer');
        const volSlider = document.getElementById('volumeSlider');
        const volValue = document.getElementById('volValue');

        audioPlayer.volume = 0.1;
        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audioPlayer.volume = val / 100;
            volValue.textContent = val + "%";
        });

        // --- SISTEMA DE CHAT P2P (PeerJS) ---
        let peer;
        let connections = [];
        let myName = "";

        // Atalhos de teclado para o Enter
        document.getElementById('userName').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') conectarAoChat();
        });

        document.getElementById('chatInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') enviarMensagem();
        });

        function conectarAoChat() {
            const input = document.getElementById('userName');
            if(!input.value) return alert("Digite um nome!");
            myName = input.value;
            
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('msg-area').style.display = 'block';

            peer = new Peer(); 

            peer.on('open', (id) => {
                adicionarMensagem("Você", "entrou no chat!");
            });

            peer.on('connection', (conn) => {
                configurarConexao(conn);
            });
        }

        function configurarConexao(conn) {
            conn.on('open', () => {
                connections.push(conn);
                atualizarContador();
            });
            conn.on('data', (data) => {
                adicionarMensagem(data.user, data.msg);
            });
        }

        function enviarMensagem() {
            const input = document.getElementById('chatInput');
            const texto = input.value;
            if(!texto) return;

            adicionarMensagem("Você", texto);
            
            connections.forEach(conn => {
                if(conn.open) conn.send({ user: myName, msg: texto });
            });
            input.value = "";
        }

        function adicionarMensagem(user, msg) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${user}</b> ${msg}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function atualizarContador() {
            document.getElementById('peer-count').innerText = connections.length + 1;
        }

        // --- SISTEMA DE SALVES ---
        async function carregarSalves() {
            try {
                const response = await fetch(URL_SALVES, { cache: "no-cache" });
                const dados = await response.json();
                const display = document.getElementById('marqueeSalves');
                let listaNomes = Array.isArray(dados) ? dados : Object.values(dados).flat();

                if (listaNomes.length > 0) {
                    const novoConteudo = listaNomes.map(nome => `<span class="salve-tag">📢 SALVE: ${nome}</span>`).join("");
                    if (display.innerHTML !== novoConteudo) display.innerHTML = novoConteudo;
                }
            } catch (e) { console.error("Erro nos salves"); }
        }
        setInterval(carregarSalves, 3000);
        carregarSalves();

        // --- RADIOS ---
        const minhasRadios = [
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pan MPB", url: "https://stream.zeno.fm/mcypvxlpz4ouv" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },
            { name: "BOB FM BRASIL", url: "https://stream1.svrdedicado.org/8134/stream" },
            { name: "Dance Classics Brasil", url: "http://play.radios.com.br/16460" },
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "Radio-Pirata-Loco", url: "https://emisoras.radiolua.com:8038/" },
            { name: "RADIO Us", url: "https://s7.yesstreaming.net:8056" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "Freestyle Brasil Web Radio", url: "http://centova2.ipstm.net:16200/" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" }
        ];

        function renderList() {
            const list = document.getElementById('radioList');
            minhasRadios.forEach((radio) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.innerHTML = `<div class="radio-icon">${radio.name[0]}</div><div><b>${radio.name}</b><br><small>AO VIVO</small></div>`;
                li.onclick = () => playRadio(radio, li);
                list.appendChild(li);
            });
        }

        function playRadio(radio, li) {
            document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            li.classList.add('active');
            const playerMain = document.getElementById('playerMain');
            playerMain.classList.remove('playing');
            document.getElementById('current-name').textContent = radio.name;
            document.getElementById('current-status').textContent = "CONECTANDO...";
            audioPlayer.src = radio.url;
            audioPlayer.play().then(() => {
                document.getElementById('current-status').textContent = "• NO AR";
                document.getElementById('art').textContent = "💿";
                playerMain.classList.add('playing');
            }).catch(() => {
                document.getElementById('current-status').textContent = "OFFLINE";
                document.getElementById('art').textContent = "❌";
            });
        }

        renderList();
    </script>
</body>
</html>
