<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO PREDRADA | LIVE</title>
    <style>
        :root { 
            --primary: #1db954; 
            --primary-glow: rgba(29, 185, 84, 0.4);
            --bg: #090909; 
            --surface: #181818; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- LETREIRO DINÂMICO --- */
        .marquee-wrapper {
            background: #000;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 100;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%; 
            animation: scroll-left 20s linear infinite;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); } 
        }

        .salve-tag {
            background: rgba(29, 185, 84, 0.15);
            padding: 5px 18px;
            border-radius: 50px;
            margin-right: 40px;
            border: 1px solid var(--primary);
            display: inline-block;
            box-shadow: inset 0 0 10px rgba(29, 185, 84, 0.2);
        }

        /* --- LAYOUT PRINCIPAL --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR ANIMADA */
        .sidebar { 
            width: 320px; 
            background-color: #000; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #282828;
        }
        
        .header-list { padding: 25px 20px; text-align: center; }
        .header-list h2 { 
            font-size: 1.3rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .radio-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            list-style: none; 
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #000;
        }

        .radio-item { 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: #121212; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid transparent;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .radio-item:hover { 
            background: #1f1f1f; 
            transform: scale(1.03); 
            border-color: #333;
        }

        .radio-item.active { 
            background: #222; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.2);
        }
        
        .radio-icon { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--primary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem; 
            color: black; 
            font-weight: bold;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* --- PLAYER CENTRAL --- */
        .main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #181818 0%, #050505 100%); 
        }

        .player-display { text-align: center; width: 90%; max-width: 450px; }
        
        .album-art { 
            width: 250px; 
            height: 250px; 
            background: #121212; 
            border-radius: 30px; 
            margin: 0 auto 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 6rem; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 20px rgba(29, 185, 84, 0.05); 
            border: 2px solid #222;
            transition: all 0.5s ease;
        }

        /* Efeito de pulso quando estiver tocando */
        .playing .album-art {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        h2#current-name { margin-bottom: 8px; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        p#current-status { 
            color: var(--primary); 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.75rem; 
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        audio { 
            width: 100%; 
            height: 45px;
            filter: invert(100%) hue-rotate(100deg) brightness(1.5); 
            opacity: 0.9;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .app-body { flex-direction: column; }
            .sidebar { width: 100%; height: 40%; }
            .album-art { width: 180px; height: 180px; font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="marqueeSalves">
            SINTONIZANDO OS MELHORES SALVES...
        </div>
    </div>

    <div class="app-body">
        <aside class="sidebar">
            <div class="header-list">
                <h2>ESTAÇÕES</h2>
                <small style="color: #555; font-weight: bold;">PREDRADA SELECTION</small>
            </div>
            <ul class="radio-list" id="radioList"></ul>
        </aside>

        <main class="main" id="playerMain">
            <div class="player-display">
                <div class="album-art" id="art">📻</div>
                <h2 id="current-name">Bem-vindo</h2>
                <p id="current-status">Escolha seu som abaixo</p>
                <audio id="audioPlayer" controls autoplay></audio>
            </div>
        </main>
    </div>

    <script>
        const URL_SALVES = "https://raw.githubusercontent.com/wandersonstt/radiolocal/refs/heads/main/salves.txt";

        async function carregarSalves() {
            try {
                const response = await fetch(`${URL_SALVES}?t=${Date.now()}`);
                if (!response.ok) throw new Error();
                const data = await response.text();
                const listaNomes = data.split('\n').map(n => n.trim()).filter(n => n !== "");
                
                if (listaNomes.length > 0) {
                    const display = document.getElementById('marqueeSalves');
                    display.innerHTML = listaNomes.map(nome => `<span class="salve-tag">📢 SALVE: ${nome}</span>`).join("");
                }
            } catch (e) { console.warn("Sincronizando salves..."); }
        }

        carregarSalves();
        setInterval(carregarSalves, 10000);

       const minhasRadios = [
            { name: "Jovem Pan", url: "https://streaming.ntelecom.com.br:7524/stream" },
            { name: "Jovem Pan FM", url: "https://radio02.zas.media/proxy/jovempanitajai/stream" },
            { name: "Jovem Pan MPB", url: "https://stream.zeno.fm/mcypvxlpz4ouv" },
            { name: "MIX 93.3", url: "https://crystalout.surfernetwork.com:8001/KSJZ-FM_MP3" },
            { name: "Radio Top Brasil", url: "https://s4.guaracast.com:48030/stream" },
            { name: "Byte Brasil", url: "https://stm8.srvvox.com.br:7428/stream" },
            { name: "BOB FM BRASIL", url: "https://stream1.svrdedicado.org/8134/stream" },
            { name: "Dance Classics Brasil", url: "http://play.radios.com.br/16460" },
            { name: "Rádio MIX FM", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/MIXFM_POA.MP3" },
            { name: "Rádio Clube de Blumenau", url: "https://paineldj5.com.br:20061/stream" },
            { name: "Radio Gospel", url: "https://stream3.svrdedicado.org/8152/stream" },
            { name: "Radio-Pirata-Loco", url: "https://emisoras.radiolua.com:8038/" },
            { name: "RADIO Us", url: "https://s7.yesstreaming.net:8056" },
            { name: "PROG ROCK BRASIL", url: "https://stm15.xcast.com.br:7526/stream" },
            { name: "Radio Usa Brasil", url: "https://cast4.hoost.com.br:20165/stream" },
            { name: "Nova Brasil FM Sao Paulo", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_SP.mp3" },
            { name: "Rádio Brasil Hits", url: "https://live.brasilhits.com/listen/brasilhits-pop/mp3" },
            { name: "Radio Grilli Brasil", url: "https://redegrillibrasil.com.br/listen/grillibrasil/radio.mp3" },
            { name: "Electro Beats Brasil", url: "https://stream.zeno.fm/r4rvnfe5iqbuv" },
            { name: "Radio Big Hitz Brasil", url: "https://servidor35.brlogic.com:7076/live" },
            { name: "Energy Brasil 98FM", url: "https://azura11.w3bserver.com/listen/energy_brasil_fm/nrjbrasil_128kbps.mp3" },
            { name: "Freestyle Brasil Web Radio", url: "http://centova2.ipstm.net:16200/" },
            { name: "RÁDIO PARÁ FM", url: "https://stm12.xcast.com.br:11014/stream" },
            { name: "Radio ONE Brasil", url: "https://streaming.conecta-la.com/radio-one-brasil.mp3" }
        ];

        const audioPlayer = document.getElementById('audioPlayer');
        const radioList = document.getElementById('radioList');
        const currentName = document.getElementById('current-name');
        const currentStatus = document.getElementById('current-status');
        const art = document.getElementById('art');
        const playerMain = document.getElementById('playerMain');

        function renderList() {
            minhasRadios.forEach((radio, index) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                li.style.animationDelay = (index * 0.05) + 's';
                li.innerHTML = `
                    <div class="radio-icon">${radio.name.charAt(0)}</div>
                    <div style="overflow:hidden">
                        <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis;">${radio.name}</div>
                        <small style="color:#666">Ao Vivo</small>
                    </div>
                `;
                li.onclick = () => playRadio(radio, li);
                radioList.appendChild(li);
            });
        }

        function playRadio(radio, element) {
            document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            playerMain.classList.remove('playing');
            currentName.textContent = radio.name;
            currentStatus.textContent = "CONECTANDO...";
            art.textContent = "📡";

            audioPlayer.src = radio.url;
            audioPlayer.play()
                .then(() => {
                    currentStatus.textContent = "• TOCANDO AGORA";
                    art.textContent = "🎵";
                    playerMain.classList.add('playing');
                })
                .catch(() => {
                    currentStatus.textContent = "OFFLINE OU BLOQUEADA";
                    art.textContent = "❌";
                    playerMain.classList.remove('playing');
                });
        }

        renderList();
    </script>
</body>
</html>
